name: damas

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-astar-service:
    build: ./apps/ai-astar-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      - PORT=3004

  backend:
    build: ./apps/backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongo:27017/damas
      - CORS_ORIGIN=*
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET:-dev-damas-secret-change-me}
      - AI_ASTAR_SERVICE_URL=http://ai-astar-service:3004
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PREMIUM_AMOUNT=${STRIPE_PREMIUM_AMOUNT:-499}
      - STRIPE_PREMIUM_CURRENCY=${STRIPE_PREMIUM_CURRENCY:-usd}
    depends_on:
      mongo:
        condition: service_healthy
      ai-astar-service:
        condition: service_started

  frontend:
    build:
      context: ./apps/frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  mongo_data:
  grafana_data:
